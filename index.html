<!DOCTYPE html>
<html lang="en">
  <head>
    <title>{{siteTitle}}</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="{{siteDescription}}" />
    <meta name="keywords" content="{{keywords}}" />
    <meta name="theme-color" content="{{accentColor}}" />
    <meta name="robots" content="index, follow" />
    <meta property="og:title" content="{{ogTitle}}" />
    <meta property="og:description" content="{{ogDescription}}" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://{{host}}/" />
    <meta name="twitter:title" content="{{ogTitle}}" />
    <meta name="twitter:description" content="{{ogDescription}}" />
    <link rel="canonical" href="https://{{host}}/" />
    <!-- Favicon -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">
    <link rel="shortcut icon" href="{{faviconPath}}">

    <!-- Open Graph Image -->
    <meta property="og:image" content="https://{{host}}{{socialImagePath}}">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:image:alt" content="{{siteTitle}}">
    <meta name="twitter:image" content="https://{{host}}{{socialImagePath}}">
    <meta name="twitter:card" content="summary_large_image">
    {{headSnippet}}
    
    <!-- Security headers - HTTP headers used instead of meta tags -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta name="referrer" content="no-referrer">
    
    <!-- Google Fonts: Rajdhani (display) + JetBrains Mono (data) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Tailwind CSS via CDN -->
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>

    <style>
      * {
        box-sizing: border-box;
      }

      :root {
        --color-base: #0a0f1a;
        --color-surface: #111827;
        --color-surface-elevated: #1a2332;
        --color-border: #243044;
        --color-text-primary: #f0f4f8;
        --color-text-secondary: #8b9cb3;
        --color-text-muted: #5a6a80;
        --color-accent: {{accentColor}};
        --color-accent-dim: {{accentColorDim}};
        --color-success: #22c55e;
        --font-display: 'Rajdhani', sans-serif;
        --font-mono: 'JetBrains Mono', monospace;
      }

      body {
        margin: 0;
        padding: 0;
        background-color: var(--color-base);
        color: var(--color-text-primary);
        width: 100%;
        font-family: 'Rajdhani', -apple-system, BlinkMacSystemFont, sans-serif;
        font-weight: 500;
      }

      /* Typography utilities */
      .font-display { font-family: var(--font-display); }
      .font-mono { font-family: var(--font-mono); }

      /* Custom color utilities */
      .bg-base { background-color: var(--color-base); }
      .bg-surface { background-color: var(--color-surface); }
      .bg-surface-elevated { background-color: var(--color-surface-elevated); }
      .border-subtle { border-color: var(--color-border); }
      .text-primary { color: var(--color-text-primary); }
      .text-secondary { color: var(--color-text-secondary); }
      .text-muted { color: var(--color-text-muted); }
      .text-accent { color: var(--color-accent); }
      .text-white { color: #ffffff; }

      /* Glow effects */
      .glow-accent {
        box-shadow: 0 0 20px rgba(14, 165, 233, 0.15);
      }
      .glow-accent-strong {
        box-shadow: 0 0 30px rgba(14, 165, 233, 0.25);
      }

      /* Grid background pattern */
      .grid-pattern {
        background-image:
          linear-gradient(rgba(36, 48, 68, 0.3) 1px, transparent 1px),
          linear-gradient(90deg, rgba(36, 48, 68, 0.3) 1px, transparent 1px);
        background-size: 40px 40px;
      }

      /* Scan line effect */
      .scanlines::before {
        content: '';
        position: absolute;
        inset: 0;
        background: repeating-linear-gradient(
          0deg,
          transparent,
          transparent 2px,
          rgba(0, 0, 0, 0.1) 2px,
          rgba(0, 0, 0, 0.1) 4px
        );
        pointer-events: none;
        opacity: 0.3;
      }

      /* Status indicator */
      .status-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background-color: var(--color-success);
        box-shadow: 0 0 8px var(--color-success);
      }

      /* Custom scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: var(--color-surface);
      }
      ::-webkit-scrollbar-thumb {
        background: var(--color-border);
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--color-text-muted);
      }

      /* Animations */
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      .animate-spin {
        animation: spin 1s linear infinite;
      }

      @keyframes pulse-glow {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }
      .animate-pulse-glow {
        animation: pulse-glow 2s ease-in-out infinite;
      }
    </style>
    
    <!-- Analytics -->
    {{analyticsSnippet}}
  </head>
  <body>
    <div id="root">{{html}}</div>
    
    <!-- Security: Prevent clickjacking -->
    <script>
      if (window.self !== window.top) {
        window.top.location = window.self.location;
      }
    </script>
    
    <!-- Structured data for SEO -->
    {{webSiteJsonLd}}

    <!-- WebPage schema with ISO date for freshness signal -->
    {{webPageJsonLd}}

    <!-- FAQ Schema (per-airline, generated from src/airlines/content/) -->
    {{faqJsonLd}}

    <!-- Chrome Extension Schema -->
    {{chromeExtensionJsonLd}}
  </body>
</html>
