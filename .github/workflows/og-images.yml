name: Regenerate OG images

on:
  schedule:
    - cron: "10 9 * * *" # daily, 09:10 UTC (after the morning scrape settles)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.13
      - run: bun install --frozen-lockfile
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: do_not_commit/playwright-browsers
          key: playwright-${{ hashFiles('bun.lock') }}
      - run: bunx playwright install --with-deps chromium
        env:
          PLAYWRIGHT_BROWSERS_PATH: do_not_commit/playwright-browsers
      - run: bun run generate-og
      - name: Commit if changed
        run: |
          if git diff --quiet static/social-image*.webp; then
            echo "no changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add static/social-image*.webp
          git commit -m "chore: refresh OG images [skip ci]"
          git push
